server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs: /app → app.html, /dashboard → dashboard.html
    location = /app {
        try_files /app.html =404;
    }

    location = /dashboard {
        try_files /dashboard.html =404;
    }

    # Default: serve files normally
    location / {
        try_files $uri $uri/ =404;
    }
}
