server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs: /app → app.html, /dashboard → dashboard.html
    location = /app {
        try_files /app.html =404;
    }

    location = /dashboard {
        try_files /dashboard.html =404;
    }

    # VT220 A/B test — alternate landing + agent setup + API docs
    location = /vt220 {
        try_files /vt220.html =404;
    }

    location = /vt220/agent {
        try_files /vt220-agent.html =404;
    }

    location = /vt220/docs {
        try_files /vt220-docs.html =404;
    }

    location = /vt220/dashboard {
        try_files /vt220-dashboard.html =404;
    }

    # Legal pages: serve index.html and let the browser scroll to the anchor
    location = /privacy {
        rewrite ^ /#privacy redirect;
    }

    location = /terms {
        rewrite ^ /#terms redirect;
    }

    # Default: serve files normally
    location / {
        try_files $uri $uri/ =404;
    }
}
